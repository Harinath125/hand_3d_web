<!DOCTYPE html>
<html>
<head>
  <title>Dual-Hand 3D Studio</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; }
    canvas { position: absolute; top: 0; left: 0; }
    #debug-canvas { transform: scaleX(-1); opacity: 0.15; pointer-events: none; z-index: 5; }
    #three-canvas { z-index: 10; }
    .ui { 
      position: absolute; top: 20px; left: 20px; color: white; z-index: 20; 
      background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; border: 1px solid #333;
    }
    .legend { font-size: 0.85em; margin-top: 10px; }
    .right-label { color: #ff3333; }
    .left-label { color: #33ff33; }
  </style>
</head>
<body>

<div class="ui">
  <strong>Advanced Dual-Hand Control</strong>
  <div class="legend">
    <span class="right-label">● Right Hand:</span> Move (Pinch)<br>
    <span class="left-label">● Left Hand:</span> Rotate (Pinch)<br>
    <span>● Both Hands:</span> Zoom (Distance)
  </div>
  <div id="status" style="font-family: monospace; font-size: 0.8em; margin-top:10px; color:#aaa;">Initializing...</div>
</div>

<canvas id="three-canvas"></canvas>
<canvas id="debug-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* ---------- THREE.JS SETUP ---------- */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

// Create a more detailed cube so rotation is obvious
const cube = new THREE.Group();
const box = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 1.2, 1.2),
    new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.8, roughness: 0.2, wireframe: false })
);
const wire = new THREE.Mesh(
    new THREE.BoxGeometry(1.21, 1.21, 1.21),
    new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.3 })
);
cube.add(box, wire);
scene.add(cube);

/* ---------- STATE MANAGEMENT ---------- */
let targetPos = new THREE.Vector3(0, 0, 0);
let targetRot = new THREE.Euler(0, 0, 0);
let targetScale = 1;
const SMOOTHING = 0.1;

/* ---------- MEDIAPIPE ---------- */
const debugCanvas = document.getElementById("debug-canvas");
const ctx = debugCanvas.getContext("2d");
debugCanvas.width = window.innerWidth;
debugCanvas.height = window.innerHeight;

const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

hands.onResults(results => {
    ctx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
    let handStates = { Left: null, Right: null };

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        results.multiHandLandmarks.forEach((landmarks, i) => {
            const label = results.multiHandedness[i].label; // "Left" or "Right"
            handStates[label] = landmarks;
            
            drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: label === 'Right' ? '#ff3333' : '#33ff33', lineWidth: 2 });
        });

        // 1. POSITION CONTROL (Right Hand)
        if (handStates.Right) {
            const r = handStates.Right;
            const pinch = Math.hypot(r[4].x - r[8].x, r[4].y - r[8].y);
            if (pinch < 0.06) {
                const mx = 1 - (r[4].x + r[8].x) / 2;
                const my = (r[4].y + r[8].y) / 2;
                const handSize = Math.hypot(r[0].x - r[9].x, r[0].y - r[9].y);
                targetPos.set((mx * 2 - 1) * 6, -(my * 2 - 1) * 4, (handSize - 0.2) * 15);
            }
        }

        // 2. ROTATION CONTROL (Left Hand)
        if (handStates.Left) {
            const l = handStates.Left;
            const pinch = Math.hypot(l[4].x - l[8].x, l[4].y - l[8].y);
            if (pinch < 0.06) {
                targetRot.y = (l[8].x - 0.5) * 10;
                targetRot.x = (l[8].y - 0.5) * 10;
            }
        }

        // 3. ZOOM CONTROL (Two Hand Interaction)
        if (handStates.Left && handStates.Right) {
            const dist = Math.hypot(handStates.Left[8].x - handStates.Right[8].x, handStates.Left[8].y - handStates.Right[8].y);
            targetScale = Math.max(0.5, Math.min(3, dist * 3));
        }
    }
    
    document.getElementById('status').innerText = 
        `Active: ${handStates.Left ? 'Left ' : ''}${handStates.Right ? 'Right' : ''}`;
});

const cam = new Camera(document.createElement("video"), {
    onFrame: async () => { await hands.send({ image: cam.video }); },
    width: 640, height: 480
});
cam.start();

/* ---------- ANIMATION LOOP ---------- */
function animate() {
    requestAnimationFrame(animate);
    
    // Smooth transitions
    cube.position.lerp(targetPos, SMOOTHING);
    cube.rotation.x = THREE.MathUtils.lerp(cube.rotation.x, targetRot.x, SMOOTHING);
    cube.rotation.y = THREE.MathUtils.lerp(cube.rotation.y, targetRot.y, SMOOTHING);
    cube.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), SMOOTHING);

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
