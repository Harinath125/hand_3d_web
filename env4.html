<!DOCTYPE html>
<html>
<head>
  <title>Precision 3D Skeleton Studio</title>
  <style>
    body { margin: 0; overflow: hidden; background: #ffffff; font-family: sans-serif; }
    .hud { position: absolute; top: 15px; width: 100%; text-align: center; color: #222; z-index: 10; pointer-events: none; }
    #debug-canvas { position: absolute; top:0; left:0; transform: scaleX(-1); opacity: 0.05; pointer-events: none; }
  </style>
</head>
<body>

<div class="hud">
  <h2>SKELETON TRACKING STUDIO</h2>
  <p>Menu on Left • Pinch Right to Grab • Move Left to Rotate</p>
</div>

<canvas id="three-canvas"></canvas>
<canvas id="debug-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* ---------- SCENE & LIGHTING ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 8;
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
scene.add(directionalLight);

/* ---------- HAND SKELETON WITH LINES ---------- */
// Connections for a human hand (MediaPipe standard)
const HAND_CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4], // thumb
    [0,5],[5,6],[6,7],[7,8], // index
    [5,9],[9,10],[10,11],[11,12], // middle
    [9,13],[13,14],[14,15],[15,16], // ring
    [13,17],[17,18],[18,19],[19,20],[0,17] // pinky
];

function createSkeletonHand(jointColor, lineColor) {
    const group = new THREE.Group();
    const joints = [];
    const lines = [];

    // Create Joint Dots
    for(let i=0; i<21; i++) {
        const m = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({color: jointColor}));
        joints.push(m); group.add(m);
    }
    // Create Connection Lines
    const lineMat = new THREE.LineBasicMaterial({ color: lineColor, linewidth: 2 });
    HAND_CONNECTIONS.forEach(() => {
        const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const line = new THREE.Line(geo, lineMat);
        lines.push(line); group.add(line);
    });

    scene.add(group);
    return { joints, lines, group };
}

const handR = createSkeletonHand(0x333333, 0x999999); // Right: Dark
const handL = createSkeletonHand(0x00aaff, 0x00aaff); // Left: Blue

/* ---------- SIDEBAR MENU ---------- */
const menuItems = [];
const shapes = [
    { type: 'box', geo: new THREE.BoxGeometry(0.6,0.6,0.6), color: 0xff4444 },
    { type: 'sphere', geo: new THREE.SphereGeometry(0.4,32,32), color: 0x44ff44 },
    { type: 'donut', geo: new THREE.TorusGeometry(0.3,0.12,16,32), color: 0x4444ff },
    { type: 'knot', geo: new THREE.TorusKnotGeometry(0.25,0.08,64,8), color: 0xffaa00 },
    { type: 'cone', geo: new THREE.ConeGeometry(0.4, 0.7, 32), color: 0xff00ff }
];

shapes.forEach((s, i) => {
    const m = new THREE.Mesh(s.geo, new THREE.MeshStandardMaterial({color: s.color, emissive: s.color, emissiveIntensity: 0}));
    m.position.set(-6.5, 3 - (i * 1.5), 0); // Positioned on the left side
    m.userData = { type: s.type, originalColor: s.color };
    scene.add(m);
    menuItems.push(m);
});

/* ---------- INTERACTION STATE ---------- */
let spawned = [];
let activeObj = null;
let lastSpawn = 0;
const targetPos = new THREE.Vector3();
const targetRot = new THREE.Euler();
let targetScale = 1;

const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8 });

hands.onResults(results => {
    const h = { Left: null, Right: null };
    if (results.multiHandLandmarks) {
        results.multiHandLandmarks.forEach((lm, i) => {
            const side = results.multiHandedness[i].label;
            h[side] = lm;
            const ghost = side === 'Right' ? handR : handL;
            
            // Update Joints
            lm.forEach((p, j) => {
                ghost.joints[j].position.set((1-p.x-0.5)*18, -(p.y-0.5)*14, -p.z*10);
            });
            // Update Lines
            HAND_CONNECTIONS.forEach((pair, idx) => {
                const p1 = ghost.joints[pair[0]].position;
                const p2 = ghost.joints[pair[1]].position;
                ghost.lines[idx].geometry.setFromPoints([p1, p2]);
            });
        });
    }

    if (h.Right) {
        const rIdx = handR.joints[8].position;
        const rThm = handR.joints[4].position;
        const rPinch = rIdx.distanceTo(rThm) < 0.7;

        // MENU INTERACTION (Touch)
        menuItems.forEach(item => {
            if (rIdx.distanceTo(item.position) < 0.7) {
                item.material.emissiveIntensity = 0.5; // Highlight
                if (Date.now() - lastSpawn > 1000) {
                    spawn(item.userData.type);
                    lastSpawn = Date.now();
                }
            } else { item.material.emissiveIntensity = 0; }
        });

        // GRAB & TRANSFORM
        if (rPinch) {
            if (!activeObj) {
                spawned.forEach(obj => { if(rIdx.distanceTo(obj.position) < 1.5) activeObj = obj; });
            }
            if (activeObj) {
                targetPos.copy(rIdx);
                if (h.Left) {
                    const lIdx = handL.joints[8].position;
                    const lThm = handL.joints[4].position;
                    targetRot.y = (lIdx.x - activeObj.position.x) * 0.5;
                    targetRot.x = -(lIdx.y - activeObj.position.y) * 0.5;
                    if (lIdx.distanceTo(lThm) < 0.7) {
                        targetScale = Math.max(0.3, rIdx.distanceTo(lIdx) * 0.3);
                    }
                }
            }
        } else { activeObj = null; }
    }
});

function spawn(type) {
    const s = shapes.find(sh => sh.type === type);
    const m = new THREE.Mesh(s.geo.clone(), new THREE.MeshStandardMaterial({color: s.color}));
    m.position.set(0,0,0);
    scene.add(m);
    spawned.push(m);
    activeObj = m;
}

const cam = new Camera(document.createElement("video"), {
    onFrame: async () => { await hands.send({ image: cam.video }); },
    width: 640, height: 480
});
cam.start();

function animate() {
    requestAnimationFrame(animate);
    if (activeObj) {
        activeObj.position.lerp(targetPos, 0.1);
        activeObj.rotation.x = THREE.MathUtils.lerp(activeObj.rotation.x, targetRot.x, 0.1);
        activeObj.rotation.y = THREE.MathUtils.lerp(activeObj.rotation.y, targetRot.y, 0.1);
        activeObj.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
    }
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
