<!DOCTYPE html>
<html>
<head>
  <title>Enhanced Spatial Studio</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    .hud { 
      position: absolute; 
      top: 20px; 
      width: 100%; 
      text-align: center; 
      color: white; 
      z-index: 10; 
      pointer-events: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    
    .hud h2 {
      margin: 0;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(to right, #fff, #a0e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .hud p {
      margin: 8px 0 0;
      font-size: 1rem;
      opacity: 0.9;
    }
    
    .controls { 
      position: absolute; 
      bottom: 30px; 
      left: 30px; 
      z-index: 10;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    
    button { 
      pointer-events: auto; 
      padding: 12px 24px; 
      cursor: pointer; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; 
      border: none; 
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    
    button:active {
      transform: translateY(1px);
    }
    
    .stats {
      position: absolute;
      top: 20px;
      right: 30px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 15px 20px;
      border-radius: 15px;
      font-size: 14px;
      z-index: 10;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .welding-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    
    #video-hidden { display: none; }
    
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 1.5rem;
      z-index: 1000;
    }
    
    .shape-menu {
      position: absolute;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.7);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .shape-item {
      width: 60px;
      height: 60px;
      margin: 15px 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    
    .shape-item:hover {
      transform: scale(1.1);
      border-color: white;
    }
    
    .shape-item.active {
      transform: scale(1.15);
      border-color: #00ffaa;
      box-shadow: 0 0 20px rgba(0,255,170,0.5);
    }
    
    .trash-label {
      position: absolute;
      right: 30px;
      bottom: 30px;
      color: white;
      background: rgba(255, 0, 0, 0.3);
      padding: 8px 15px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: bold;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      pointer-events: none;
    }
    
    .hand-cam {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 160px;
      height: 120px;
      border-radius: 10px;
      overflow: hidden;
      z-index: 10;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.5);
      display: none; /* Hidden by default, enable for debugging */
    }
    
    .hand-cam video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror the video */
    }
  </style>
</head>
<body>

<div class="loading" id="loading">
  <div>Loading Spatial Studio...</div>
</div>

<div class="hud">
  <h2>SPATIAL STUDIO</h2>
  <p>👆 Pinch to Select • ✌️ Two-finger Pinch to Scale • 🤏 Two-hand Pinch to Weld • ✊ Pull Apart to Break</p>
</div>

<div class="stats" id="stats">
  Objects: <span id="objectCount">0</span> | Groups: <span id="groupCount">0</span>
</div>

<div class="welding-indicator" id="weldingIndicator">⚡ WELDING!</div>

<div class="trash-label">🗑️ Drag objects here to delete</div>

<div class="hand-cam" id="handCam">
  <video id="cameraFeed"></video>
</div>

<div class="controls">
  <button onclick="clearData()" style="background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);">RESET CANVAS</button>
  <button onclick="saveScene()" style="background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);">SAVE SCENE</button>
  <button onclick="toggleGravity()" id="gravityBtn">GRAVITY: OFF</button>
  <button onclick="spawnShape()" style="background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);">SPAWN SHAPE</button>
  <button onclick="toggleCameraView()" style="background: linear-gradient(135deg, #8A2BE2 0%, #4B0082 100%);">TOGGLE CAMERA</button>
</div>

<div class="shape-menu" id="shapeMenu">
  <!-- Shapes will be added here -->
</div>

<canvas id="three-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* ---------- INITIALIZATION ---------- */
document.getElementById('loading').style.display = 'flex';

/* ---------- ENHANCED SCENE SETUP ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 12);

const renderer = new THREE.WebGLRenderer({ 
  canvas: document.getElementById('three-canvas'), 
  antialias: true,
  alpha: true,
  powerPreference: "high-performance"
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// Enhanced lighting
scene.add(new THREE.AmbientLight(0x404040, 0.8));

const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
mainLight.position.set(10, 20, 15);
mainLight.castShadow = true;
mainLight.shadow.mapSize.width = 2048;
mainLight.shadow.mapSize.height = 2048;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0x5555ff, 0.4);
fillLight.position.set(-10, 5, -15);
scene.add(fillLight);

// Add some particles for atmosphere
const particleGeometry = new THREE.BufferGeometry();
const particleCount = 500;
const posArray = new Float32Array(particleCount * 3);
for(let i = 0; i < particleCount * 3; i++) {
  posArray[i] = (Math.random() - 0.5) * 100;
}
particleGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const particleMaterial = new THREE.PointsMaterial({
  size: 0.1,
  color: 0x4488ff,
  transparent: true,
  opacity: 0.5
});
const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

/* ---------- FIXED DUSTBIN ---------- */
function createDustbin() {
  // Main trash can body
  const dustbinBody = new THREE.Mesh(
    new THREE.CylinderGeometry(1.0, 0.7, 1.5, 16, 1),
    new THREE.MeshStandardMaterial({ 
      color: 0xff4444,
      roughness: 0.7,
      metalness: 0.3,
      transparent: true,
      opacity: 0.6
    })
  );
  dustbinBody.position.set(7, -2, 0);
  dustbinBody.castShadow = true;
  dustbinBody.receiveShadow = true;
  
  // Trash can rim
  const dustbinRim = new THREE.Mesh(
    new THREE.TorusGeometry(0.85, 0.15, 8, 24),
    new THREE.MeshStandardMaterial({ 
      color: 0xcccccc,
      roughness: 0.4,
      metalness: 0.8
    })
  );
  dustbinRim.position.set(7, -1.25, 0);
  dustbinRim.rotation.x = Math.PI / 2;
  dustbinRim.castShadow = true;
  
  // Trash can base
  const dustbinBase = new THREE.Mesh(
    new THREE.CylinderGeometry(0.72, 0.72, 0.1, 16),
    new THREE.MeshStandardMaterial({ 
      color: 0x777777,
      roughness: 0.8,
      metalness: 0.2
    })
  );
  dustbinBase.position.set(7, -2.8, 0);
  dustbinBase.castShadow = true;
  dustbinBase.receiveShadow = true;
  
  // Create group
  const dustbin = new THREE.Group();
  dustbin.add(dustbinBody);
  dustbin.add(dustbinRim);
  dustbin.add(dustbinBase);
  
  // Add pulsing glow effect
  const glowGeometry = new THREE.CylinderGeometry(1.1, 0.8, 1.6, 16, 1);
  const glowMaterial = new THREE.MeshBasicMaterial({
    color: 0xff0000,
    transparent: true,
    opacity: 0.2,
    side: THREE.BackSide
  });
  const glow = new THREE.Mesh(glowGeometry, glowMaterial);
  glow.position.set(7, -2, 0);
  dustbin.add(glow);
  
  // Animation for pulsing glow
  dustbin.userData.glow = glow;
  dustbin.userData.pulseDirection = 1;
  dustbin.userData.pulseSpeed = 0.01;
  
  scene.add(dustbin);
  return dustbin;
}

const dustbin = createDustbin();

/* ---------- FIXED HAND MODELS ---------- */
const HAND_CONNECTIONS = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];

function createEnhancedHand(jCol, lCol, glowColor) {
    const group = new THREE.Group();
    const joints = [];
    const lines = [];
    
    for(let i=0; i<21; i++) {
        const geometry = new THREE.SphereGeometry(0.08, 12, 12);
        const material = new THREE.MeshPhongMaterial({
            color: jCol,
            shininess: 100,
            specular: new THREE.Color(glowColor)
        });
        const m = new THREE.Mesh(geometry, material);
        m.castShadow = true;
        joints.push(m); 
        group.add(m);
    }
    
    const lineMat = new THREE.LineBasicMaterial({ 
        color: lCol, 
        transparent: true, 
        opacity: 0.7,
        linewidth: 2
    });
    
    HAND_CONNECTIONS.forEach(() => {
        const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const line = new THREE.Line(geo, lineMat);
        lines.push(line); 
        group.add(line);
    });
    
    scene.add(group);
    return { group, joints, lines };
}

const handR = createEnhancedHand(0xffaa00, 0xff5500, 0xffaa00);
const handL = createEnhancedHand(0x00aaff, 0x0088ff, 0x00aaff);

/* ---------- ENHANCED STATE MANAGEMENT ---------- */
let spawned = [];
let activeObj = null;
let lastSpawn = 0;
let gravityEnabled = false;
let cameraViewEnabled = false;
const rawHandData = { Left: null, Right: null };
const targetPos = new THREE.Vector3();
const targetRot = new THREE.Euler();
const targetScale = new THREE.Vector3(1,1,1);
const velocity = new THREE.Vector3();

// Welding system state
let weldingState = {
    isWelding: false,
    weldTarget: null,
    weldProgress: 0,
    sparkParticles: []
};

// Create spark particles for welding effect
function createSparkParticles(count, position) {
    const particles = [];
    const geometry = new THREE.SphereGeometry(0.05, 8, 8);
    const material = new THREE.MeshBasicMaterial({ color: 0xffff00 });
    
    for(let i = 0; i < count; i++) {
        const particle = new THREE.Mesh(geometry, material);
        particle.position.copy(position);
        particle.userData.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 0.5,
            (Math.random() - 0.5) * 0.5,
            (Math.random() - 0.5) * 0.5
        );
        particle.userData.life = 1.0;
        scene.add(particle);
        weldingState.sparkParticles.push(particle);
    }
}

function updateSparkParticles() {
    for(let i = weldingState.sparkParticles.length - 1; i >= 0; i--) {
        const particle = weldingState.sparkParticles[i];
        particle.position.add(particle.userData.velocity);
        particle.userData.life -= 0.02;
        particle.material.opacity = particle.userData.life;
        
        if(particle.userData.life <= 0) {
            scene.remove(particle);
            weldingState.sparkParticles.splice(i, 1);
        }
    }
}

/* ---------- SHAPE SYSTEM ---------- */
const shapes = [
    { 
        type: 'box', 
        geo: new THREE.BoxGeometry(0.6, 0.6, 0.6), 
        color: 0xff5555,
        name: 'Cube'
    },
    { 
        type: 'sphere', 
        geo: new THREE.SphereGeometry(0.4, 24, 24), 
        color: 0x55ff55,
        name: 'Sphere'
    },
    { 
        type: 'cone', 
        geo: new THREE.ConeGeometry(0.4, 0.8, 24), 
        color: 0x5555ff,
        name: 'Cone'
    },
    { 
        type: 'donut', 
        geo: new THREE.TorusGeometry(0.35, 0.15, 16, 32), 
        color: 0xff55ff,
        name: 'Torus'
    },
    { 
        type: 'cylinder', 
        geo: new THREE.CylinderGeometry(0.4, 0.4, 0.8, 24), 
        color: 0xffff55,
        name: 'Cylinder'
    },
    { 
        type: 'pyramid', 
        geo: new THREE.ConeGeometry(0.5, 0.8, 4), 
        color: 0xff8855,
        name: 'Pyramid'
    }
];

// Create shape menu
const shapeMenu = document.getElementById('shapeMenu');
shapes.forEach((shape, i) => {
    const div = document.createElement('div');
    div.className = 'shape-item';
    div.style.background = `#${shape.color.toString(16).padStart(6, '0')}`;
    div.innerHTML = `<span style="color:white; font-size:24px;">${getShapeIcon(shape.type)}</span>`;
    div.onclick = () => selectShape(i);
    shapeMenu.appendChild(div);
});

let selectedShapeIndex = 0;

function selectShape(index) {
    selectedShapeIndex = index;
    const items = document.querySelectorAll('.shape-item');
    items.forEach((item, i) => {
        item.classList.toggle('active', i === index);
    });
}

function getShapeIcon(type) {
    const icons = {
        'box': '⬜',
        'sphere': '⚪',
        'cone': '🔺',
        'donut': '⭕',
        'cylinder': '🛢️',
        'pyramid': '🔺'
    };
    return icons[type] || '❓';
}

/* ---------- ENHANCED CORE LOGIC ---------- */

function enhancedWeld(objA, objB) {
    // Don't weld if already in same group
    if (objA.parent === objB.parent && objA.parent !== scene) return;
    
    // Check if objects are already welded together through chain
    if (areObjectsConnected(objA, objB)) return;
    
    // Show welding indicator
    showWeldingIndicator();
    
    // Create welding sparks
    const midPoint = new THREE.Vector3().addVectors(objA.position, objB.position).multiplyScalar(0.5);
    createSparkParticles(20, midPoint);
    
    // Create welding beam effect
    const weldBeam = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05, 0.05, objA.position.distanceTo(objB.position), 8),
        new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.7 })
    );
    weldBeam.position.copy(midPoint);
    weldBeam.lookAt(objB.position);
    weldBeam.rotateX(Math.PI / 2);
    scene.add(weldBeam);
    
    // Animate weld beam
    setTimeout(() => scene.remove(weldBeam), 300);
    
    const group = new THREE.Group();
    scene.add(group);
    
    // Calculate midpoint and set group position
    const mid = new THREE.Vector3().addVectors(objA.position, objB.position).multiplyScalar(0.5);
    group.position.copy(mid);
    
    // Adjust child positions relative to group
    objA.position.sub(mid);
    objB.position.sub(mid);
    
    group.attach(objA);
    group.attach(objB);
    
    // Add weld joint visual
    const jointGeometry = new THREE.SphereGeometry(0.1, 16, 16);
    const jointMaterial = new THREE.MeshBasicMaterial({ 
        color: 0xffff00,
        transparent: true,
        opacity: 0.5
    });
    const joint = new THREE.Mesh(jointGeometry, jointMaterial);
    joint.position.set(0, 0, 0);
    group.add(joint);
    
    group.userData.isGroup = true;
    group.userData.weldJoints = [joint];
    
    spawned = spawned.filter(o => o !== objA && o !== objB);
    spawned.push(group);
    activeObj = group;
    
    updateStats();
    save();
    
    return group;
}

function areObjectsConnected(objA, objB) {
    if (objA === objB) return true;
    
    // Check if they share a parent group
    if (objA.parent === objB.parent && objA.parent.userData?.isGroup) {
        return true;
    }
    
    // Recursively check through group hierarchy
    function isInHierarchy(obj, target) {
        if (obj === target) return true;
        if (obj.children) {
            for (let child of obj.children) {
                if (isInHierarchy(child, target)) return true;
            }
        }
        return false;
    }
    
    return isInHierarchy(objA, objB) || isInHierarchy(objB, objA);
}

function breakGroup(group) {
    if (!group.userData?.isGroup) return;
    
    // Create break effect
    createSparkParticles(15, group.position);
    
    const children = [...group.children].filter(child => !child.userData?.weldJoints);
    
    children.forEach(c => {
        // Restore world position
        c.position.add(group.position);
        scene.attach(c);
        spawned.push(c);
    });
    
    // Remove weld joints
    if (group.userData.weldJoints) {
        group.userData.weldJoints.forEach(joint => scene.remove(joint));
    }
    
    spawned = spawned.filter(o => o !== group);
    scene.remove(group);
    activeObj = null;
    
    updateStats();
    save();
}

function createMesh(type, color) {
    const s = shapes.find(sh => sh.type === type);
    if (!s) return null;
    
    const m = new THREE.Mesh(
        s.geo.clone(), 
        new THREE.MeshStandardMaterial({
            color: color,
            roughness: 0.3,
            metalness: 0.2,
            shadowSide: THREE.DoubleSide
        })
    );
    
    m.castShadow = true;
    m.receiveShadow = true;
    m.userData.type = type;
    m.userData.velocity = new THREE.Vector3();
    m.userData.canWeld = true;
    
    return m;
}

function spawnShape(type = null, color = null) {
    const shapeType = type || shapes[selectedShapeIndex].type;
    const shapeColor = color || shapes[selectedShapeIndex].color;
    
    const m = createMesh(shapeType, shapeColor);
    if (!m) return;
    
    // Spawn in front of camera
    const spawnDistance = 5;
    const spawnVector = new THREE.Vector3(0, 0, -spawnDistance);
    spawnVector.applyQuaternion(camera.quaternion);
    m.position.copy(camera.position).add(spawnVector);
    
    scene.add(m);
    spawned.push(m);
    activeObj = m;
    lastSpawn = Date.now();
    
    updateStats();
    save();
    
    return m;
}

/* ---------- ENHANCED SAVE/LOAD ---------- */
function save() {
    const data = spawned.map(obj => ({
        isGroup: obj.userData?.isGroup || false,
        pos: obj.position.toArray(),
        rot: obj.rotation.toArray(),
        scale: obj.scale.toArray(),
        type: obj.userData?.type,
        color: obj.material?.color.getHex(),
        children: obj.userData?.isGroup ? obj.children
            .filter(c => !c.userData?.weldJoints)
            .map(c => ({
                type: c.userData.type,
                pos: c.position.toArray(),
                rot: c.rotation.toArray(),
                color: c.material.color.getHex()
            })) : null
    }));
    localStorage.setItem('spatial_studio_v3', JSON.stringify(data));
}

function saveScene() {
    save();
    alert('Scene saved!');
}

function load() {
    const saved = localStorage.getItem('spatial_studio_v3');
    if (!saved) {
        // Create initial scene with some shapes
        setTimeout(() => {
            spawnShape('box', 0xff5555);
            spawnShape('sphere', 0x55ff55);
        }, 500);
        return;
    }
    
    try {
        JSON.parse(saved).forEach(item => {
            if (item.isGroup) {
                const g = new THREE.Group();
                g.position.fromArray(item.pos);
                g.rotation.fromArray(item.rot);
                g.scale.fromArray(item.scale);
                g.userData.isGroup = true;
                
                if (item.children) {
                    item.children.forEach(c => {
                        const m = createMesh(c.type, c.color);
                        if (m) {
                            m.position.fromArray(c.pos);
                            m.rotation.fromArray(c.rot);
                            g.add(m);
                        }
                    });
                }
                
                scene.add(g);
                spawned.push(g);
            } else {
                const m = createMesh(item.type, item.color);
                if (m) {
                    m.position.fromArray(item.pos);
                    m.rotation.fromArray(item.rot);
                    m.scale.fromArray(item.scale);
                    scene.add(m);
                    spawned.push(m);
                }
            }
        });
    } catch (e) {
        console.error('Failed to load scene:', e);
    }
    
    updateStats();
}

function clearData() {
    if (confirm('Are you sure you want to reset the canvas? All objects will be lost.')) {
        localStorage.removeItem('spatial_studio_v3');
        spawned.forEach(obj => scene.remove(obj));
        spawned = [];
        activeObj = null;
        updateStats();
    }
}

/* ---------- GRAVITY SYSTEM ---------- */
function toggleGravity() {
    gravityEnabled = !gravityEnabled;
    document.getElementById('gravityBtn').textContent = 
        `GRAVITY: ${gravityEnabled ? 'ON' : 'OFF'}`;
    document.getElementById('gravityBtn').style.background = gravityEnabled ? 
        'linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%)' :
        'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
}

function applyGravity() {
    if (!gravityEnabled) return;
    
    const floorY = -8;
    spawned.forEach(obj => {
        if (obj !== activeObj) {
            obj.userData.velocity.y -= 0.05; // Gravity acceleration
            obj.position.add(obj.userData.velocity);
            
            // Floor collision
            if (obj.position.y < floorY) {
                obj.position.y = floorY;
                obj.userData.velocity.y *= -0.6; // Bounce with energy loss
                obj.userData.velocity.x *= 0.9; // Friction
                obj.userData.velocity.z *= 0.9;
            }
        }
    });
}

/* ---------- UI UPDATES ---------- */
function updateStats() {
    const objectCount = spawned.length;
    const groupCount = spawned.filter(obj => obj.userData?.isGroup).length;
    document.getElementById('objectCount').textContent = objectCount;
    document.getElementById('groupCount').textContent = groupCount;
}

function showWeldingIndicator() {
    const indicator = document.getElementById('weldingIndicator');
    indicator.style.opacity = '1';
    setTimeout(() => {
        indicator.style.opacity = '0';
    }, 1000);
}

function toggleCameraView() {
    cameraViewEnabled = !cameraViewEnabled;
    const handCam = document.getElementById('handCam');
    handCam.style.display = cameraViewEnabled ? 'block' : 'none';
}

/* ---------- FIXED HAND TRACKING ---------- */
const hands = new Hands({ 
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` 
});

hands.setOptions({ 
    maxNumHands: 2, 
    modelComplexity: 1, 
    minDetectionConfidence: 0.7, 
    minTrackingConfidence: 0.7 
});

hands.onResults(results => {
    rawHandData.Left = null;
    rawHandData.Right = null;
    if (results.multiHandLandmarks) {
        results.multiHandLandmarks.forEach((lm, i) => {
            const side = results.multiHandedness[i].label;
            rawHandData[side] = lm;
        });
    }
});

// Create video element for camera feed
const videoElement = document.createElement('video');
videoElement.id = 'cameraFeed';
document.getElementById('handCam').appendChild(videoElement);

const cam = new Camera(videoElement, {
    onFrame: async () => { 
        await hands.send({ image: cam.video }); 
    }, 
    width: 640, 
    height: 480
});
cam.start();


function mapLandmarkTo3D(landmark) {
    // Flip x-axis (mirror) and adjust scale/position
    const x = (0.5 - landmark.x) * 20; // Mirror and scale
    const y = -(landmark.y - 0.5) * 14; // Invert Y and scale
    const z = -landmark.z * 15; // Use depth information

    return new THREE.Vector3(x, y, z);
}


/* ---------- FIXED ANIMATION LOOP ---------- */
function animate() {
    requestAnimationFrame(animate);
    
    // Update dustbin glow animation
    if (dustbin.userData.glow) {
        dustbin.userData.glow.material.opacity += dustbin.userData.pulseDirection * dustbin.userData.pulseSpeed;
        if (dustbin.userData.glow.material.opacity > 0.3 || dustbin.userData.glow.material.opacity < 0.1) {
            dustbin.userData.pulseDirection *= -1;
        }
    }
    
    // Update hand visuals with FIXED orientation
    ['Right', 'Left'].forEach(side => {
        const lm = rawHandData[side];
        const visual = side === 'Right' ? handR : handL;
        if (lm) {
            visual.group.visible = true;
            
            // Map landmarks to 3D space
            lm.forEach((landmark, j) => {
                const jt = visual.joints[j];
                const targetPos = mapLandmarkTo3D(landmark);
                jt.position.lerp(targetPos, 0.3); // Smooth movement
            });
            
            // Update connections
            HAND_CONNECTIONS.forEach((pair, idx) => {
                visual.lines[idx].geometry.setFromPoints([
                    visual.joints[pair[0]].position,
                    visual.joints[pair[1]].position
                ]);
            });
        } else {
            visual.group.visible = false;
        }
    });
    
    // Update spark particles
    updateSparkParticles();
    
    // Apply gravity
    applyGravity();
    
    // Right hand interactions
    if (rawHandData.Right) {
        const rIdx = handR.joints[8].position; // Index finger tip
        const rThumb = handR.joints[4].position; // Thumb tip
        const rPinch = rIdx.distanceTo(rThumb) < 1.2; // Pinch threshold
        const rMiddle = handR.joints[12].position;
        const rTwoFingerPinch = rIdx.distanceTo(rMiddle) < 1.5 && rIdx.distanceTo(rThumb) < 1.5;
        
        // Object selection with pinch
        if (rPinch && !rTwoFingerPinch) {
            if (!activeObj) {
                // Find closest object
                let closestObj = null;
                let closestDist = 2.0; // Selection radius
                
                spawned.forEach(obj => {
                    const dist = rIdx.distanceTo(obj.position);
                    if (dist < closestDist) {
                        closestDist = dist;
                        closestObj = obj;
                    }
                });
                
                if (closestObj) {
                    activeObj = closestObj;
                    // Visual feedback for selection
                    activeObj.material.emissive = new THREE.Color(0x333333);
                }
            }
            
            if (activeObj) {
                // Move object
                targetPos.copy(rIdx);
                targetPos.z = Math.max(targetPos.z, -5); // Don't let objects go too far
                
                // Check trash bin proximity
                const trashPosition = new THREE.Vector3(7, -2, 0);
                const distanceToTrash = activeObj.position.distanceTo(trashPosition);
                
                if (distanceToTrash < 2.0) {
                    // Highlight trash bin when object is near
                    dustbin.children[0].material.color.setHex(0xff0000);
                    dustbin.children[0].material.opacity = 0.8;
                } else {
                    dustbin.children[0].material.color.setHex(0xff4444);
                    dustbin.children[0].material.opacity = 0.6;
                }
                
                // Welding system
                if (activeObj.userData.canWeld) {
                    spawned.forEach(other => {
                        if (other !== activeObj && 
                            other.userData.canWeld &&
                            activeObj.position.distanceTo(other.position) < 1.0) {
                            
                            // Show welding preview (glow effect)
                            other.material.emissive = new THREE.Color(0x222200);
                            
                            if (activeObj.position.distanceTo(other.position) < 0.6) {
                                // Auto-weld when very close
                                enhancedWeld(activeObj, other);
                            }
                        } else if (other !== activeObj) {
                            // Reset glow for non-proximate objects
                            other.material.emissive = new THREE.Color(0x000000);
                        }
                    });
                }
            }
        } else if (rTwoFingerPinch) {
            // Two-finger pinch for scaling
            if (activeObj) {
                const dist = rIdx.distanceTo(rMiddle);
                const scale = Math.max(0.3, Math.min(3.0, dist * 0.8));
                targetScale.setScalar(scale);
            }
        } else {
            // Release object
            if (activeObj) {
                // Reset trash bin appearance
                dustbin.children[0].material.color.setHex(0xff4444);
                dustbin.children[0].material.opacity = 0.6;
                
                // Reset object glow
                activeObj.material.emissive = new THREE.Color(0x000000);
                
                // Check for trash bin
                const trashPosition = new THREE.Vector3(7, -2, 0);
                if (activeObj.position.distanceTo(trashPosition) < 1.5) {
                    scene.remove(activeObj);
                    spawned = spawned.filter(o => o !== activeObj);
                    createSparkParticles(15, activeObj.position);
                    updateStats();
                    save();
                }
                
                // Apply release velocity for gravity
                if (gravityEnabled) {
                    activeObj.userData.velocity.copy(velocity);
                }
            }
            activeObj = null;
        }
        
        // Two-hand welding break
        if (rawHandData.Left && activeObj && activeObj.userData?.isGroup) {
            const lIdx = handL.joints[8].position;
            const lThumb = handL.joints[4].position;
            const lPinch = lIdx.distanceTo(lThumb) < 1.2;
            
            if (lPinch && rPinch) {
                const handDistance = rIdx.distanceTo(lIdx);
                
                if (handDistance > 3.0) {
                    // Break group when hands are pulled apart
                    breakGroup(activeObj);
                } else if (handDistance > 1.5) {
                    // Two-hand rotation
                    const midPoint = new THREE.Vector3()
                        .addVectors(rIdx, lIdx)
                        .multiplyScalar(0.5);
                    
                    targetRot.y = (midPoint.x - activeObj.position.x) * 0.5;
                    targetRot.x = -(midPoint.y - activeObj.position.y) * 0.5;
                }
            }
        }
    }
    
    // Smooth object movement
    if (activeObj) {
        // Store velocity for gravity
        velocity.subVectors(targetPos, activeObj.position).multiplyScalar(0.2);
        
        activeObj.position.lerp(targetPos, 0.2);
        activeObj.rotation.x = THREE.MathUtils.lerp(activeObj.rotation.x, targetRot.x, 0.2);
        activeObj.rotation.y = THREE.MathUtils.lerp(activeObj.rotation.y, targetRot.y, 0.2);
        activeObj.scale.lerp(targetScale, 0.2);
    }
    
    // Rotate particles for atmosphere
    particles.rotation.y += 0.001;
    
    renderer.render(scene, camera);
}

/* ---------- INITIALIZE AND START ---------- */
load();
updateStats();
selectShape(0);

// Hide loading screen
setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
    }, 300);
}, 1000);

animate();

// Handle window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Add keyboard shortcuts
window.addEventListener('keydown', (e) => {
    switch(e.key.toLowerCase()) {
        case ' ':
            e.preventDefault();
            spawnShape();
            break;
        case 'g':
            toggleGravity();
            break;
        case 'c':
            toggleCameraView();
            break;
        case '1':
        case '2':
        case '3':
        case '4':
        case '5':
        case '6':
            const index = parseInt(e.key) - 1;
            if (index < shapes.length) {
                selectShape(index);
            }
            break;
        case 'escape':
            if (activeObj) {
                activeObj.material.emissive = new THREE.Color(0x000000);
                activeObj = null;
            }
            break;
        case 'd':
            // Debug: log hand positions
            if (rawHandData.Right) {
                console.log('Right hand index finger:', handR.joints[8].position);
            }
            break;
    }
});

// Add click to spawn for testing (without camera)
document.addEventListener('click', (e) => {
    if (e.target.tagName === 'BUTTON' || e.target.closest('.shape-item') || e.target.closest('.trash-label') || e.target.closest('.hand-cam')) return;
    
    // Convert mouse to 3D position
    const mouse = new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
    );
    
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    
    // Check for object selection
    const intersects = raycaster.intersectObjects(spawned);
    if (intersects.length > 0) {
        activeObj = intersects[0].object;
        // Traverse up to find parent group if needed
        while (activeObj.parent && activeObj.parent !== scene) {
            activeObj = activeObj.parent;
        }
        activeObj.material.emissive = new THREE.Color(0x333333);
    } else {
        // Spawn new shape at click position
        const distance = 10;
        const pos = new THREE.Vector3(mouse.x, mouse.y, 0.5);
        pos.unproject(camera);
        pos.sub(camera.position).normalize();
        pos.multiplyScalar(distance).add(camera.position);
        
        const shape = spawnShape();
        if (shape) {
            shape.position.copy(pos);
        }
    }
});

// Show controls on first visit
if (!localStorage.getItem('spatial_studio_visited')) {
    setTimeout(() => {
        alert('Welcome to Spatial Studio!\n\nControls:\n• Click/Pinch to select objects\n• Drag with one hand to move\n• Two-finger pinch to scale\n• Bring objects close to weld\n• Pull apart with two hands to break\n• Drag to trash bin (red cylinder) to delete\n• Press SPACE to spawn new shapes\n• Press 1-6 to select shape type\n• Press C to toggle camera view');
        localStorage.setItem('spatial_studio_visited', 'true');
    }, 2000);
}

console.log('Hand orientation fix applied!');
console.log('Hand mapping: x = (0.5 - landmark.x) * 20, y = (landmark.y - 0.5) * 14, z = -landmark.z * 15');
