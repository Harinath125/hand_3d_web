<!DOCTYPE html>
<html>
<head>
  <title>3D Hand-Controlled Car</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
    canvas { position: absolute; top: 0; left: 0; }
    #debug-canvas { transform: scaleX(-1); opacity: 0.2; pointer-events: none; z-index: 5; }
    .ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 20; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; }
  </style>
</head>
<body>
<div class="ui">
  <strong>Hand Car Controller</strong><br>
  <small>Right: Position | Left: Rotate | Both: Scale</small>
  <div id="status" style="margin-top:5px; color:#00ff00;">Initializing Camera...</div>
</div>
<canvas id="three-canvas"></canvas>
<canvas id="debug-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);

// BUILD THE CAR
const car = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 1), new THREE.MeshStandardMaterial({ color: 0xff3300 }));
car.add(body);
const cabin = new THREE.Mesh(new THREE.BoxGeometry(1, 0.4, 0.8), new THREE.MeshStandardMaterial({ color: 0x333333 }));
cabin.position.set(-0.2, 0.4, 0);
car.add(cabin);
const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 16);
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
[[-0.6, -0.2, 0.5], [0.6, -0.2, 0.5], [-0.6, -0.2, -0.5], [0.6, -0.2, -0.5]].forEach(pos => {
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.position.set(...pos); w.rotation.x = Math.PI / 2;
    car.add(w);
});
scene.add(car);

let targetPos = new THREE.Vector3(0,0,0), targetRot = new THREE.Euler(0,0,0), targetScale = 1;
const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });
hands.onResults(results => {
    if (results.multiHandLandmarks) {
        let h = { Left: null, Right: null };
        results.multiHandLandmarks.forEach((lm, i) => h[results.multiHandedness[i].label] = lm);
        if (h.Right) {
            const p = Math.hypot(h.Right[4].x - h.Right[8].x, h.Right[4].y - h.Right[8].y);
            if (p < 0.06) targetPos.set((1-h.Right[8].x - 0.5) * 10, -(h.Right[8].y - 0.5) * 8, 0);
        }
        if (h.Left) {
            const p = Math.hypot(h.Left[4].x - h.Left[8].x, h.Left[4].y - h.Left[8].y);
            if (p < 0.06) { targetRot.y = (h.Left[8].x - 0.5) * 5; targetRot.z = (h.Left[8].y - 0.5) * 2; }
        }
        if (h.Left && h.Right) targetScale = Math.hypot(h.Left[8].x-h.Right[8].x, h.Left[8].y-h.Right[8].y) * 3;
    }
});
const cam = new Camera(document.createElement("video"), { onFrame: async () => await hands.send({image: cam.video}), width: 640, height: 480 });
cam.start();

function animate() {
    requestAnimationFrame(animate);
    car.position.lerp(targetPos, 0.1);
    car.rotation.y = THREE.MathUtils.lerp(car.rotation.y, targetRot.y, 0.1);
    car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, targetRot.z, 0.1);
    car.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
