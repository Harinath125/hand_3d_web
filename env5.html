<!DOCTYPE html>
<html>
<head>
  <title>Persistent 3D Studio - Dustbin Edition</title>
  <style>
    body { margin: 0; overflow: hidden; background: #ffffff; font-family: sans-serif; }
    .hud { position: absolute; top: 15px; width: 100%; text-align: center; color: #222; z-index: 10; pointer-events: none; }
    #debug-canvas { position: absolute; top:0; left:0; transform: scaleX(-1); opacity: 0.05; pointer-events: none; }
  </style>
</head>
<body>

<div class="hud">
  <h2>STABLE SPATIAL STUDIO</h2>
  <p>Pinch to Grab • Drag to Bottom-Right Bin to Delete</p>
</div>

<canvas id="three-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* ---------- SCENE SETUP ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 8;
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const light = new THREE.DirectionalLight(0xffffff, 0.8);
light.position.set(5, 10, 5);
scene.add(light);

/* ---------- SKELETON HANDS ---------- */
const HAND_CONNECTIONS = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];

function createSkeletonHand(jointColor, lineColor) {
    const group = new THREE.Group();
    const joints = [], lines = [];
    for(let i=0; i<21; i++) {
        const m = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({color: jointColor}));
        joints.push(m); group.add(m);
    }
    const lineMat = new THREE.LineBasicMaterial({ color: lineColor });
    HAND_CONNECTIONS.forEach(() => {
        const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const line = new THREE.Line(geo, lineMat);
        lines.push(line); group.add(line);
    });
    scene.add(group);
    return { joints, lines };
}
const handR = createSkeletonHand(0x333333, 0x999999);
const handL = createSkeletonHand(0x00aaff, 0x00aaff);

/* ---------- SIDEBAR MENU ---------- */
const menuItems = [];
const shapes = [
    { type: 'box', geo: new THREE.BoxGeometry(0.5, 0.5, 0.5), color: 0xff5555 },
    { type: 'sphere', geo: new THREE.SphereGeometry(0.35, 16, 16), color: 0x55ff55 },
    { type: 'cone', geo: new THREE.ConeGeometry(0.35, 0.6, 16), color: 0x5555ff },
    { type: 'cylinder', geo: new THREE.CylinderGeometry(0.3, 0.3, 0.6, 16), color: 0xffff55 },
    { type: 'donut', geo: new THREE.TorusGeometry(0.3, 0.1, 12, 24), color: 0xff55ff },
    { type: 'knot', geo: new THREE.TorusKnotGeometry(0.25, 0.08, 64, 8), color: 0x55ffff },

    // Additional shapes
    { type: 'octahedron', geo: new THREE.OctahedronGeometry(0.35), color: 0xffaa55 },
    { type: 'tetrahedron', geo: new THREE.TetrahedronGeometry(0.35), color: 0xaaff55 },
    { type: 'icosahedron', geo: new THREE.IcosahedronGeometry(0.35), color: 0x55aaff },
    { type: 'dodecahedron', geo: new THREE.DodecahedronGeometry(0.35), color: 0xff55aa },
    { type: 'plane', geo: new THREE.PlaneGeometry(0.5, 0.5), color: 0x55ffaa },
    { type: 'ring', geo: new THREE.RingGeometry(0.2, 0.35, 32), color: 0xaa55ff },
    { type: 'lathe', geo: new THREE.LatheGeometry([
        new THREE.Vector2(0, 0),
        new THREE.Vector2(0.2, 0.2),
        new THREE.Vector2(0.1, 0.4),
        new THREE.Vector2(0.2, 0.6)
    ], 32), color: 0xffffaa },
    { type: 'extrude', geo: new THREE.ExtrudeGeometry(
        new THREE.Shape([
            new THREE.Vector2(0,0),
            new THREE.Vector2(0.2,0),
            new THREE.Vector2(0.2,0.2),
            new THREE.Vector2(0,0.2)
        ]),
        { depth: 0.3, bevelEnabled: false }
    ), color: 0xaaffff }
];



shapes.forEach((s, i) => {
    const m = new THREE.Mesh(s.geo, new THREE.MeshStandardMaterial({color: s.color}));
    m.position.set(-6.5, 3 - (i * 1.5), 0);
    m.userData = { type: s.type };
    scene.add(m);
    menuItems.push(m);
});

/* ---------- DUSTBIN ---------- */
const binGeo = new THREE.CylinderGeometry(0.7, 0.5, 0.9, 16);
const binMat = new THREE.MeshStandardMaterial({ color: 0xff0000, transparent: true, opacity: 0.3 });
const dustbin = new THREE.Mesh(binGeo, binMat);
dustbin.position.set(6.5, -3.5, 0);
scene.add(dustbin);

/* ---------- LOGIC ---------- */
let spawned = [];
let activeObj = null;
let lastSpawn = 0;
const targetPos = new THREE.Vector3();
const targetRot = new THREE.Euler();

const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8 });

hands.onResults(results => {
    const h = { Left: null, Right: null };
    if (results.multiHandLandmarks) {
        results.multiHandLandmarks.forEach((lm, i) => {
            const side = results.multiHandedness[i].label;
            h[side] = lm;
            const ghost = side === 'Right' ? handR : handL;
            lm.forEach((p, j) => ghost.joints[j].position.set((1-p.x-0.5)*18, -(p.y-0.5)*14, -p.z*10));
            HAND_CONNECTIONS.forEach((pair, idx) => {
                ghost.lines[idx].geometry.setFromPoints([ghost.joints[pair[0]].position, ghost.joints[pair[1]].position]);
            });
        });
    }

    if (h.Right) {
        const rIdx = handR.joints[8].position;
        const rThm = handR.joints[4].position;
        const rPinch = rIdx.distanceTo(rThm) < 0.7;

        // Menu Touch to Spawn
        menuItems.forEach(item => {
            if (rIdx.distanceTo(item.position) < 0.7 && Date.now() - lastSpawn > 1000) {
                spawn(item.userData.type);
                lastSpawn = Date.now();
            }
        });

        // Object Manipulation
        if (rPinch) {
            if (!activeObj) {
                spawned.forEach(obj => { if(rIdx.distanceTo(obj.position) < 1.2) activeObj = obj; });
            }
            if (activeObj) {
                targetPos.copy(rIdx);
                
                // Dustbin Hover Effect
                const distToBin = activeObj.position.distanceTo(dustbin.position);
                dustbin.material.opacity = distToBin < 1.5 ? 0.8 : 0.3;

                if (h.Left) {
                    const lIdx = handL.joints[8].position;
                    const lThm = handL.joints[4].position;
                    targetRot.y = (lIdx.x - activeObj.position.x) * 0.5;
                    targetRot.x = -(lIdx.y - activeObj.position.y) * 0.5;
                    if (lIdx.distanceTo(lThm) < 0.7) {
                        const s = Math.max(0.3, rIdx.distanceTo(lIdx) * 0.4);
                        activeObj.scale.set(s, s, s);
                    }
                }
            }
        } else { 
            // Handle Drop (Delete if over bin)
            if (activeObj) {
                if (activeObj.position.distanceTo(dustbin.position) < 1.5) {
                    scene.remove(activeObj);
                    spawned = spawned.filter(o => o !== activeObj);
                }
                dustbin.material.opacity = 0.3; // Reset bin transparency
            }
            activeObj = null; 
        }
    }
});

function spawn(type) {
    const s = shapes.find(sh => sh.type === type);
    const m = new THREE.Mesh(s.geo.clone(), new THREE.MeshStandardMaterial({color: s.color}));
    m.position.set(0,0,0);
    scene.add(m);
    spawned.push(m);
    activeObj = m;
}

const cam = new Camera(document.createElement("video"), {
    onFrame: async () => { await hands.send({ image: cam.video }); }, width: 640, height: 480
});
cam.start();

function animate() {
    requestAnimationFrame(animate);
    if (activeObj) {
        activeObj.position.lerp(targetPos, 0.12);
        activeObj.rotation.x = THREE.MathUtils.lerp(activeObj.rotation.x, targetRot.x, 0.12);
        activeObj.rotation.y = THREE.MathUtils.lerp(activeObj.rotation.y, targetRot.y, 0.12);
    }
    renderer.render(scene, camera);
}
animate();

// Handle Window Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
