<!DOCTYPE html>
<html>
<head>
  <title>Clean Hands-Free 3D Studio</title>
  <style>
    body { margin: 0; overflow: hidden; background: #ffffff; font-family: 'Segoe UI', sans-serif; }
    #debug-canvas { position: absolute; top:0; left:0; transform: scaleX(-1); opacity: 0.05; pointer-events: none; }
    .hud { 
      position: absolute; top: 20px; width: 100%; text-align: center; 
      color: #333; z-index: 10; pointer-events: none; 
    }
  </style>
</head>
<body>

<div class="hud">
  <h2 style="margin:0;">3D SPATIAL STUDIO</h2>
  <p>Reach for the floating icons to spawn items • Pinch to drag</p>
</div>

<canvas id="three-canvas"></canvas>
<canvas id="debug-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* ---------- SCENE SETUP ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

// Better lighting for white background
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const light = new THREE.DirectionalLight(0xffffff, 0.8);
light.position.set(5, 10, 7);
scene.add(light);

// Optional Grid Floor
const grid = new THREE.GridHelper(20, 20, 0xcccccc, 0xeeeeee);
grid.position.y = -5;
scene.add(grid);

/* ---------- VIRTUAL HAND ---------- */
const handGroup = new THREE.Group();
const jointMat = new THREE.MeshBasicMaterial({ color: 0x222222 }); // Dark joints for white BG
const jointGeo = new THREE.SphereGeometry(0.08, 8, 8);
const joints = [];

for (let i = 0; i < 21; i++) {
    const joint = new THREE.Mesh(jointGeo, jointMat);
    joints.push(joint);
    handGroup.add(joint);
}
scene.add(handGroup);

/* ---------- FLOATING MENU ---------- */
const menuItems = [];
const createMenuButton = (color, x, type, label) => {
    const group = new THREE.Group();
    
    // The Icon
    let geo;
    if (type === 'sphere') geo = new THREE.SphereGeometry(0.4, 16, 16);
    else if (type === 'donut') geo = new THREE.TorusGeometry(0.3, 0.15, 12, 24);
    else geo = new THREE.TorusKnotGeometry(0.3, 0.1, 64, 8);
    
    const icon = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: color }));
    group.add(icon);
    
    // A subtle ring around the button
    const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.6, 0.02, 16, 100),
        new THREE.MeshBasicMaterial({ color: 0xaaaaaa })
    );
    group.add(ring);
    
    group.position.set(x, 3.5, 0);
    group.userData = { type: type, originalColor: color };
    scene.add(group);
    menuItems.push(group);
};

createMenuButton(0x4caf50, -2.5, 'sphere'); // Green
createMenuButton(0x2196f3, 0, 'donut');   // Blue
createMenuButton(0xff9800, 2.5, 'knot');   // Orange

/* ---------- TRASH BIN ---------- */
const bin = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 1.2, 1.2),
    new THREE.MeshStandardMaterial({ color: 0x333333, wireframe: true })
);
bin.position.set(-6, -4, 0);
scene.add(bin);

/* ---------- LOGIC ---------- */
let spawnedObjects = [];
let activeObject = null;
let lastSpawnTime = 0;

const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const h = results.multiHandLandmarks[0];
        
        // Update Hand Positions
        h.forEach((lm, i) => {
            joints[i].position.set((1 - lm.x - 0.5) * 15, -(lm.y - 0.5) * 10, -lm.z * 5);
        });

        const indexTip = joints[8].position;
        const thumbTip = joints[4].position;
        const pinchDist = indexTip.distanceTo(thumbTip);

        // Menu Interaction
        menuItems.forEach(item => {
            const dist = indexTip.distanceTo(item.position);
            if (dist < 0.8) {
                item.scale.setScalar(1.4);
                if (Date.now() - lastSpawnTime > 1200) {
                    spawn(item.userData.type);
                    lastSpawnTime = Date.now();
                }
            } else {
                item.scale.lerp(new THREE.Vector3(1,1,1), 0.1);
            }
        });

        // Dragging Logic
        if (pinchDist < 0.6) {
            if (!activeObject && spawnedObjects.length > 0) {
                // Find closest object to grab
                let closest = null;
                let minDist = 2;
                spawnedObjects.forEach(obj => {
                    const d = indexTip.distanceTo(obj.position);
                    if (d < minDist) { minDist = d; closest = obj; }
                });
                activeObject = closest;
            }
            
            if (activeObject) {
                activeObject.position.lerp(indexTip, 0.2);
                // Trash check
                if (activeObject.position.distanceTo(bin.position) < 1.2) {
                    scene.remove(activeObject);
                    spawnedObjects = spawnedObjects.filter(o => o !== activeObject);
                    activeObject = null;
                }
            }
        } else {
            activeObject = null;
        }
    }
});

function spawn(type) {
    let geo;
    if (type === 'sphere') geo = new THREE.SphereGeometry(0.6, 32, 32);
    else if (type === 'donut') geo = new THREE.TorusGeometry(0.5, 0.2, 16, 100);
    else geo = new THREE.TorusKnotGeometry(0.4, 0.15, 100, 16);

    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
        color: new THREE.Color(`hsl(${Math.random() * 360}, 70%, 50%)`),
        roughness: 0.3,
        metalness: 0.2
    }));
    mesh.position.set(0, 0, 0);
    scene.add(mesh);
    spawnedObjects.push(mesh);
}

const cam = new Camera(document.createElement("video"), {
    onFrame: async () => { await hands.send({ image: cam.video }); },
    width: 640, height: 480
});
cam.start();

function animate() {
    requestAnimationFrame(animate);
    menuItems.forEach(item => { item.children[0].rotation.y += 0.02; });
    spawnedObjects.forEach(obj => { obj.rotation.x += 0.005; });
    bin.rotation.y += 0.01;
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
