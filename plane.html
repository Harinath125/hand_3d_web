<!DOCTYPE html>
<html>
<head>
  <title>3D Hand-Controlled Airplane</title>
  <style>
    body { margin: 0; overflow: hidden; background: #001529; font-family: sans-serif; }
    canvas { position: absolute; top: 0; left: 0; }
    #debug-canvas { transform: scaleX(-1); opacity: 0.1; pointer-events: none; z-index: 5; }
    .ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 20; background: rgba(0,30,60,0.8); padding: 15px; border-radius: 8px; border: 1px solid #0055aa; }
  </style>
</head>
<body>
<div class="ui">
  <strong>Hand Flight Simulator</strong><br>
  <small>Right: Flight Path | Left: Pitch/Yaw | Both: Scale</small>
  <div id="status" style="margin-top:5px; color:#00d9ff;">Connecting to Sensors...</div>
</div>
<canvas id="three-canvas"></canvas>
<canvas id="debug-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 6;
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(10, 10, 10);
scene.add(light);

// BUILD THE PLANE
const plane = new THREE.Group();
const fuselage = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.2, 2.5, 12), new THREE.MeshStandardMaterial({ color: 0xdddddd }));
fuselage.rotation.z = Math.PI / 2;
plane.add(fuselage);
const wings = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 3.5), new THREE.MeshStandardMaterial({ color: 0xaa0000 }));
plane.add(wings);
const tail = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 1.2), new THREE.MeshStandardMaterial({ color: 0xaa0000 }));
tail.position.set(-1.1, 0.2, 0);
plane.add(tail);
const prop = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.2, 0.1), new THREE.MeshStandardMaterial({ color: 0x333333 }));
prop.position.x = 1.3;
plane.add(prop);
scene.add(plane);

let targetPos = new THREE.Vector3(0,0,0), targetRot = new THREE.Euler(0,0,0), targetScale = 1;
const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });
hands.onResults(results => {
    if (results.multiHandLandmarks) {
        let h = { Left: null, Right: null };
        results.multiHandLandmarks.forEach((lm, i) => h[results.multiHandedness[i].label] = lm);
        if (h.Right) {
            const p = Math.hypot(h.Right[4].x - h.Right[8].x, h.Right[4].y - h.Right[8].y);
            if (p < 0.06) targetPos.set((1-h.Right[8].x - 0.5) * 12, -(h.Right[8].y - 0.5) * 8, 0);
        }
        if (h.Left) {
            const p = Math.hypot(h.Left[4].x - h.Left[8].x, h.Left[4].y - h.Left[8].y);
            if (p < 0.06) { targetRot.z = (h.Left[8].x - 0.5) * 3; targetRot.x = (h.Left[8].y - 0.5) * 3; }
        }
        if (h.Left && h.Right) targetScale = Math.hypot(h.Left[8].x-h.Right[8].x, h.Left[8].y-h.Right[8].y) * 3;
    }
});
const cam = new Camera(document.createElement("video"), { onFrame: async () => await hands.send({image: cam.video}), width: 640, height: 480 });
cam.start();

function animate() {
    requestAnimationFrame(animate);
    prop.rotation.x += 0.5; // Spin the propeller!
    plane.position.lerp(targetPos, 0.08);
    plane.rotation.z = THREE.MathUtils.lerp(plane.rotation.z, targetRot.z, 0.1);
    plane.rotation.x = THREE.MathUtils.lerp(plane.rotation.x, targetRot.x, 0.1);
    plane.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
